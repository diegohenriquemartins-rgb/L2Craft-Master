<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L2 Epic Crafter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffd700;
            --dark-bg: #0d0e15;
            --card-bg: rgba(25, 26, 40, 0.85);
            --text-main: #cdd6f4;
            --text-muted: #8c8fa1;
            --theme-color: #ff4a4a; 
            --theme-color-translucent: rgba(255, 74, 74, 0.2);
            --hover-bg: rgba(255, 255, 255, 0.05);
            --success-green: #a6e3a1;
            --tree-line: #45475a;
            --alert-red: #ff4a4a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top center, #1a1b26 0%, #0d0e15 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 2rem 1rem;
            margin: 0;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--theme-color-translucent);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.02);
            max-width: 1200px;
            width: 100%;
            transition: border-color 0.5s ease;
            box-sizing: border-box;
        }

        /* --- CATEGORIAS (MENU SUPERIOR) --- */
        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .cat-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 10px;
            position: relative;
        }

        .cat-btn:hover { color: var(--primary-gold); }
        
        .cat-btn.active {
            color: var(--primary-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .cat-btn.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-gold);
            box-shadow: 0 0 10px var(--primary-gold);
            border-radius: 5px;
        }

        /* --- SUB-CATEGORIAS (SETS E JOIAS E ARMAS) --- */
        .sub-category-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
            display: none; 
        }
        
        .sub-cat-btn {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .sub-cat-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sub-cat-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary-gold);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* --- ITENS (MENU INFERIOR) --- */
        .item-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            min-height: 45px;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--tree-line);
            color: var(--text-muted);
            padding: 10px 18px;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }

        .tab-btn.active {
            background: var(--theme-color-translucent);
            border-color: var(--theme-color);
            color: var(--theme-color);
            box-shadow: 0 0 15px var(--theme-color-translucent);
            transform: scale(1.05);
        }

        .empty-category {
            color: var(--text-muted);
            font-style: italic;
            margin-top: 10px;
            text-align: center;
            width: 100%;
        }

        /* --- RESTO DO ESTILO --- */
        h1 { font-family: 'Cinzel', serif; text-align: center; font-size: 2.5rem; margin-top: 0; margin-bottom: 5px; background: linear-gradient(90deg, var(--theme-color), var(--primary-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 4px 15px var(--theme-color-translucent); transition: all 0.5s ease; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; }
        .header-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 2.5rem; background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 250px;}
        label { font-weight: 600; color: var(--theme-color); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.5s ease; }
        .input-main { padding: 10px 20px; font-size: 2rem; text-align: center; border: 2px solid var(--theme-color-translucent); border-radius: 12px; background-color: #0b0c10; color: var(--primary-gold); font-family: 'Cinzel', serif; font-weight: bold; outline: none; width: 100px; transition: all 0.3s ease; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .input-main:focus { border-color: var(--theme-color); box-shadow: 0 0 15px var(--theme-color-translucent), inset 0 2px 10px rgba(0,0,0,0.5); }
        .btn-limpar { background-color: rgba(255, 74, 74, 0.1); color: var(--alert-red); border: 1px solid var(--alert-red); padding: 12px 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; height: fit-content; margin-top: 25px; }
        .btn-limpar:hover { background-color: var(--alert-red); color: white; box-shadow: 0 0 15px rgba(255, 74, 74, 0.4); }

        .tree-section { background: rgba(14, 15, 23, 0.6); border-radius: 12px; border: 1px solid var(--theme-color-translucent); padding: 20px; margin-bottom: 2.5rem; font-size: 0.95rem; overflow-x: auto; transition: border-color 0.5s ease; -webkit-overflow-scrolling: touch; }
        .tree-section h2 { font-family: 'Cinzel', serif; color: var(--theme-color); margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid var(--theme-color-translucent); padding-bottom: 10px; transition: color 0.5s ease; }
        details { margin-left: 15px; border-left: 1px solid var(--tree-line); padding-left: 5px; margin-bottom: 2px; }
        details[open] { margin-bottom: 8px; }
        summary { cursor: pointer; list-style: none; display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; transition: background 0.2s; user-select: none; flex-wrap: wrap; }
        summary::-webkit-details-marker { display: none; }
        summary:hover, .tree-leaf:hover { background-color: var(--hover-bg); }
        summary::before { content: '▶'; font-size: 0.7em; color: var(--theme-color); transition: transform 0.2s, color 0.5s ease; display: inline-block; width: 15px; text-align: center; flex-shrink: 0;}
        details[open] > summary::before { transform: rotate(90deg); }
        .tree-leaf { margin-left: 15px; padding: 6px 8px; padding-left: 28px; display: flex; align-items: center; gap: 8px; border-left: 1px solid var(--tree-line); border-radius: 6px; flex-wrap: wrap; }
        .qty-base { font-weight: bold; color: #fff; }
        .item-name { color: var(--text-main); font-weight: 600; }
        .recipe-tag { color: var(--primary-gold); font-size: 0.85em; }
        .qty-total { color: #a6e3a1; font-family: monospace; font-size: 0.9em;}

        .tables-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100%, 1fr)); gap: 25px; }
        @media (min-width: 1024px) {
             .tables-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        }
        
        .table-section { background: rgba(0, 0, 0, 0.4); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); overflow-x: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        .table-section h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--theme-color); text-align: center; margin: 0; padding: 15px; background: var(--theme-color-translucent); border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.5s ease; min-width: 300px; }
        table { width: 100%; border-collapse: collapse; min-width: 300px; }
        th { padding: 12px 10px; font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--tree-line); background: rgba(0, 0, 0, 0.2); white-space: nowrap; }
        td { padding: 8px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); font-size: 0.95rem; vertical-align: middle; }
        tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: var(--hover-bg); }
        .material-name-tb { color: var(--text-main); font-weight: 600; line-height: 1.3;}
        .total-number { font-family: 'Inter', monospace; color: #fff; font-weight: 600; text-align: right; }
        .td-falta { font-weight: bold; }
        .input-tenho { width: 70px; padding: 6px; font-size: 0.95rem; text-align: center; border: 1px solid #45475a; border-radius: 6px; background-color: #181825; color: var(--success-green); font-family: 'Inter', monospace; font-weight: bold; outline: none; transition: all 0.2s ease; }
        .input-tenho:focus { border-color: var(--theme-color); background-color: #0b0c10; }
        .input-tenho::-webkit-inner-spin-button, .input-tenho::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .container { padding: 1rem; border-radius: 12px; }
            h1 { font-size: 1.8rem; }
            
            .category-tabs, .sub-category-tabs, .item-tabs { 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                justify-content: flex-start; 
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }
            .category-tabs::-webkit-scrollbar, .sub-category-tabs::-webkit-scrollbar, .item-tabs::-webkit-scrollbar { height: 4px; }
            .category-tabs::-webkit-scrollbar-track, .sub-category-tabs::-webkit-scrollbar-track, .item-tabs::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
            .category-tabs::-webkit-scrollbar-thumb, .sub-category-tabs::-webkit-scrollbar-thumb, .item-tabs::-webkit-scrollbar-thumb { background: var(--theme-color-translucent); border-radius: 4px; }
            
            .cat-btn { font-size: 1rem; white-space: nowrap; flex-shrink: 0; }
            .cat-btn.active::after { display: none; }
            
            .tab-btn { padding: 8px 12px; font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; }
            
            .header-controls { flex-direction: column; gap: 15px; padding: 15px; }
            .input-main { width: 100%; max-width: 150px; }
            .btn-limpar { margin-top: 0; width: 100%; }
            
            .tree-section { padding: 10px; }
            details { margin-left: 8px; padding-left: 5px; }
            .tree-leaf { margin-left: 8px; padding-left: 20px; font-size: 0.85rem; }
            summary { font-size: 0.85rem; }
            
            th, td { padding: 8px 5px; font-size: 0.8rem; }
            .material-name-tb { font-size: 0.85rem; }
            .input-tenho { width: 55px; padding: 6px 2px; font-size: 0.85rem; }
            .total-number { font-size: 0.85rem; }
        }
    </style>
</head>

        let categoriaAtiva = 'armas';

        function mudarCategoria(catId) {
            categoriaAtiva = catId;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`cat-${catId}`).classList.add('active');

            const subCatTabs = document.getElementById('subCategoryTabs');
            
            document.querySelectorAll('.sub-cat-btn').forEach(btn => btn.style.display = 'none');

            if (catId === 'joias') {
                subCatTabs.style.display = 'flex';
                document.querySelectorAll('.sub-joias').forEach(btn => btn.style.display = 'block');
                mudarSubCategoria('tateossian');

                document.querySelectorAll('.sub-armas').forEach(btn => btn.style.display = 'block');

            } else {
                subCatTabs.style.display = 'none';

                renderizarAbasItens(itensDestaCategoria);
            }
        }

            const itensDestaSubCategoria = Object.values(bancoDeDados).filter(item => item.category === categoriaAtiva && item.subcategory === subcatId);

        function renderizarAbasItens(itens) {
            const containerAbas = document.getElementById('itemTabsContainer');
            const wrapperPrincipal = document.getElementById('mainContentWrapper');
            
            containerAbas.innerHTML = '';

            if (itens.length === 0) {
                containerAbas.innerHTML = '<span class="empty-category">Ainda não adicionamos as fotos dos itens desta aba.</span>';
                wrapperPrincipal.style.display = 'none'; 
            } else {
                wrapperPrincipal.style.display = 'block';
                itens.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'tab-btn';
                    btn.id = `btn-${item.id}`;
                    btn.onclick = () => mudarAba(item.id);
                    btn.innerHTML = `${item.icon} ${item.title.replace('Sealed ', '').replace('Recipe: ', '').replace(' - ', '')}`;
                    containerAbas.appendChild(btn);
                });
                mudarAba(itens[0].id);
            }
        }

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const btnAtivo = document.getElementById(`btn-${idDoItem}`);
            if(btnAtivo) btnAtivo.classList.add('active');

            document.getElementById('mainTitle').innerText = dadosItem.title;
            document.getElementById('mainSubtitle').innerText = `${dadosItem.subtitle} • Crafting & Inventory Manager`;

            document.documentElement.style.setProperty('--theme-color', dadosItem.themeColor);
            const hex = dadosItem.themeColor.replace('#', '');
            const r = parseInt(hex.substring(0, 2), 16), g = parseInt(hex.substring(2, 4), 16), b = parseInt(hex.substring(4, 6), 16);
            document.documentElement.style.setProperty('--theme-color-translucent', `rgba(${r}, ${g}, ${b}, 0.2)`);

            const invSalvo = localStorage.getItem(`l2_app_${idDoItem}_inventario`);
            inventario = invSalvo ? JSON.parse(invSalvo) : {};
            const qtdSalva = localStorage.getItem(`l2_app_${idDoItem}_qtd`);
            document.getElementById('qtdAm').value = qtdSalva || 1;

            atualizarApp();
        }

        function criarIdSeguro(nome) { return nome.replace(/[^a-zA-Z0-9]/g, ''); }
        function atualizarCorFalta(elemento, quantidadeFalta) { elemento.style.color = quantidadeFalta <= 0 ? 'var(--success-green)' : 'var(--alert-red)'; }

        function renderizarArvore(nodes, parentTotal) {
            let html = '';
            nodes.forEach(node => {
                const currentTotal = Math.round(node.qty * parentTotal); 
                const displayBase = node.displayQty || node.qty;
                const isRecipe = node.children && node.children.length > 0;
                if (isRecipe) {
                    html += `<details open><summary><span class="qty-base">${displayBase}</span><span class="item-name">${node.name}</span><span class="recipe-tag">(recipe)</span><span class="qty-total">(${currentTotal.toLocaleString('pt-BR')} total)</span></summary><div class="children-wrapper">${renderizarArvore(node.children, currentTotal)}</div></details>`;
                } else {
                    html += `<div class="tree-leaf"><span class="qty-base">${displayBase}</span><span class="item-name" style="color: var(--text-main); font-weight: normal;">${node.name}</span><span class="qty-total">(${currentTotal.toLocaleString('pt-BR')} total)</span></div>`;
                }
            });
            return html;
        }

        function atualizarCalculosCascata(qtdItemFinal) {
            const db = bancoDeDados[itemAtivo];
            let faltas = {};
            let invTemp = { ...inventario }; 

            function percorrer(nodes, multiplicador) {
                nodes.forEach(node => {
                    let qtyTotalNecessaria = Math.ceil(Math.round(node.qty * multiplicador * 1000) / 1000);
                    let tenho = invTemp[node.name] || 0;
                    let usar = Math.min(qtyTotalNecessaria, tenho);
                    invTemp[node.name] -= usar; 
                    
                    let faltaReal = qtyTotalNecessaria - usar;
                    faltas[node.name] = (faltas[node.name] || 0) + faltaReal;
                    
                    if (node.children && faltaReal > 0) {
                        percorrer(node.children, faltaReal);
                    }
                });
            }
            
            percorrer(db.arvore, qtdItemFinal);
            return faltas;
        }

        function registrarInventario(material, valorDigitado) {
            let tenho = parseInt(valorDigitado) || 0;
            if (tenho < 0) tenho = 0; 
            inventario[material] = tenho;
            localStorage.setItem(`l2_app_${itemAtivo}_inventario`, JSON.stringify(inventario));
            
            const inputQtd = document.getElementById('qtdAm').value;
            const qtd = Math.max(1, parseInt(inputQtd) || 0); 
            
            const faltasCalculadas = atualizarCalculosCascata(qtd);
            const db = bancoDeDados[itemAtivo];
            const todasAsListas = [db.matsPrincipais, db.matsIntermediarios, db.matsBasicos];
            
            todasAsListas.forEach(lista => {
                for (const mat in lista) {
                    const matId = criarIdSeguro(mat);
                    const celulaFalta = document.getElementById(`falta-${matId}`);
                    if (celulaFalta) {
                        let novaFalta = faltasCalculadas[mat] || 0;
                        celulaFalta.innerHTML = novaFalta.toLocaleString('pt-BR');
                        atualizarCorFalta(celulaFalta, novaFalta);
                    }
                }
            });
        }

        function renderizarTabela(idTabela, objetoMateriais, qtd, faltasCalculadas) {
            const tbody = document.getElementById(idTabela);
            tbody.innerHTML = ''; 
            for (const [material, quantidadeBase] of Object.entries(objetoMateriais)) {
                const total = Math.round(quantidadeBase * qtd);
                const matId = criarIdSeguro(material);
                const idFalta = `falta-${matId}`;
                
                let tenho = inventario[material] || '';
                let falta = faltasCalculadas[material] || 0; 
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="material-name-tb">${material}</td>
                                <td class="total-number">${total.toLocaleString('pt-BR')}</td>
                                <td style="text-align: center;"><input type="number" class="input-tenho" min="0" value="${tenho}" placeholder="0" oninput="registrarInventario('${material}', this.value)"></td>
                                <td class="total-number td-falta" id="${idFalta}">${falta.toLocaleString('pt-BR')}</td>`;
                tbody.appendChild(tr);
                atualizarCorFalta(document.getElementById(idFalta), falta);
            }
        }

        function atualizarApp() {
            const inputQtd = document.getElementById('qtdAm').value;
            const qtd = Math.max(1, parseInt(inputQtd) || 0); 
            localStorage.setItem(`l2_app_${itemAtivo}_qtd`, qtd);
            const db = bancoDeDados[itemAtivo];
            
            document.getElementById('craftingTreeRoot').innerHTML = renderizarArvore(db.arvore, qtd);
            const faltasCalculadas = atualizarCalculosCascata(qtd);
            
            renderizarTabela('tabPrincipais', db.matsPrincipais, qtd, faltasCalculadas);
            renderizarTabela('tabIntermediarios', db.matsIntermediarios, qtd, faltasCalculadas);
            renderizarTabela('tabBasicos', db.matsBasicos, qtd, faltasCalculadas);
        }

        function limparDados() {
            const nomeItem = bancoDeDados[itemAtivo].title;
            if (confirm(`Tem certeza que deseja limpar todo o inventário do item: ${nomeItem}?`)) {
                inventario = {};
                localStorage.removeItem(`l2_app_${itemAtivo}_inventario`);
                localStorage.removeItem(`l2_app_${itemAtivo}_qtd`);
                document.getElementById('qtdAm').value = 1;
                atualizarApp();
            }
        }

        window.onload = () => mudarCategoria('armas');
    </script>
</body>
</html>
